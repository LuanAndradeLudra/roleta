<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteio Mensal - 35.000,00 - 11/09</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0f1419;
        color: #fff;
        line-height: 1.6;
      }
      .container {
        max-width: 1440px;
        margin: 0 auto;
        padding: 2rem;
      }
      body.locked .container {
        display: none;
      }

      .header {
        text-align: center;
        margin-bottom: 3rem;
        padding: 2rem 0;
        border-bottom: 1px solid #2a2a2a;
        width: 1440px;
      }

      .wheel-section {
        width: 1440px;
        background: #1a1a1a;
        border-radius: 12px;
        padding: 2rem;
        margin-bottom: 2rem;
        border: 1px solid #2a2a2a;
      }
      .wheel-title {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
        color: #fff;
      }

      .wheel-container {
        position: relative;
        margin-bottom: 2rem;
        overflow: hidden;
      }
      .wheel {
        height: 200px;
        border: 2px solid #333;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        background: #111;
      }
      .wheel-items {
        display: flex;
        height: 100%;
        will-change: transform;
      }
      .wheel-item {
        width: 200px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: start;
        gap: 0.5rem;
        padding: 1rem;
        border-right: 1px solid #2a2a2a;
        background: #1a1a1a;
        flex-shrink: 0;
        position: relative;
      }
      .wheel-item:nth-child(even) {
        background: #222;
      }
      .backdrop {
        z-index: 0;
        filter: blur(5px) brightness(0.5);
        position: absolute;
        width: 200px;
        height: 200px;
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.2;
      }
      .wheel-item img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        z-index: 1;
        border-radius: 8px;
      }
      .wheel-item h4 {
        font-size: 0.8rem;
        font-weight: 600;
        text-align: center;
        color: #fff;
        z-index: 1;
      }

      .wheel-pointer {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 80%;
        background: #fff;
        border-radius: 2px;
        z-index: 10;
      }
      .wheel-pointer::before,
      .wheel-pointer::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
      }
      .wheel-pointer::before {
        top: -8px;
        border-bottom: 8px solid #fff;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
      }
      .wheel-pointer::after {
        bottom: -8px;
        border-top: 8px solid #fff;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
      }

      .result-section {
        background: #1a1a1a;
        border-radius: 12px;
        padding: 2rem;
        text-align: center;
        margin-bottom: 2rem;
        border: 1px solid #2a2a2a;
      }
      .result-display {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 1.5rem;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .draw-button {
        background: #333;
        color: #fff;
        border: none;
        padding: 1rem 2rem;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }
      .draw-button:hover {
        background: #444;
        transform: translateY(-1px);
      }

      .status-section {
        background: #1a1a1a;
        border-radius: 12px;
        padding: 2rem;
        border: 1px solid #2a2a2a;
        width: 1440px;
      }
      .status-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: #fff;
        text-align: center;
      }
      .status-table {
        width: 100%;
        border-collapse: collapse;
      }
      .status-table th {
        background: #222;
        padding: 1rem;
        text-align: left;
        font-weight: 700;
        color: #fff;
        border-bottom: 1px solid #333;
      }
      .status-table td {
        padding: 1rem;
        border-bottom: 1px solid #2a2a2a;
        font-weight: 400;
      }
      .status-table tr:hover {
        background: #222;
      }
      .status-won {
        color: #90ee90;
        font-weight: 700;
      }
      .status-available {
        color: #888;
        font-weight: 400;
      }

      #gate {
        position: fixed;
        inset: 0;
        background: rgba(15, 20, 25, 0.97);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .gate-box {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      .gate-box h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }
      .gate-box input {
        width: 100%;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
        border-radius: 8px;
        border: 1px solid #333;
        background: #111;
        color: #fff;
        font-family: inherit;
        font-size: 1rem;
      }
      .gate-box button {
        width: 100%;
        background: #333;
        color: #fff;
        border: none;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
      }
      .gate-box button:hover {
        background: #444;
      }
    </style>
